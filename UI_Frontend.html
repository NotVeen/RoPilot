<head>

    <style>
        /* CSS Reset & Variables */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-deep: #0a0a0a;
            --bg-sidebar: #111111;
            --bg-card: #1a1a1a;
            --bg-hover: #222222;
            --border-color: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --text-green: #4ade80;
            --text-yellow: #facc15;
            --btn-bg: #222222;
            --btn-hover: #333333;
            --btn-danger: #3b1313;
            --btn-danger-hover: #5c1818;
            --text-danger: #f87171;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            user-select: none; /* Disable text selection */
        }
        
        input {
            user-select: auto;
        }

        /* Titlebar */
        .titlebar {
            height: 48px;
            background-color: var(--bg-deep);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            user-select: none;
            flex-shrink: 0;
            z-index: 50;
        }

        .titlebar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            letter-spacing: 0.3px;
        }

        .title-badge {
            background-color: #222;
            color: var(--text-muted);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .drag-area {
            flex-grow: 1;
            height: 100%;
            cursor: default;
        }

        .titlebar-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .control-btn:hover {
            background-color: var(--bg-hover);
            color: var(--text-main);
        }

        .control-btn.close:hover {
            background-color: var(--btn-danger);
            color: var(--text-danger);
        }

        /* Layout */
        .app-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 8px;
            flex-shrink: 0;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sidebar.collapsed {
            width: 72px;
        }

        .hamburger-btn {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 16px 12px 12px 12px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 8px;
            transition: color 0.2s, padding 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #1a1a1a;
            border-radius: 0;
        }
        
        .sidebar.collapsed .hamburger-btn {
            padding: 16px 8px 12px 8px;
        }
        
        .hamburger-btn:hover {
            color: #fff;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 13px;
            transition: background 0.2s, color 0.2s, padding 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        
        .sidebar.collapsed .nav-item {
            padding: 12px 10px;
        }
        
        .nav-text {
            white-space: nowrap;
            margin-left: 12px;
            transition: max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            max-width: 150px;
            overflow: hidden;
        }
        
        .sidebar.collapsed .nav-text {
            opacity: 0;
            max-width: 0;
            margin-left: 0;
        }

        .nav-item:hover {
            background-color: var(--bg-hover);
            color: var(--text-main);
        }

        .nav-item.active {
            background-color: #1f1f1f;
            color: #ffffff;
            box-shadow: inset 2px 0 0 var(--text-main);
        }

        .sidebar-spacer {
            flex-grow: 1;
        }

        .btn-add-account {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .add-account-text {
            white-space: nowrap;
            margin-left: 8px;
            transition: max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            max-width: 150px;
        }
        
        .sidebar.collapsed .add-account-text {
            opacity: 0;
            max-width: 0;
            margin-left: 0;
        }

        .btn-add-account:hover {
            background-color: #dddddd;
        }

        .add-menu-item {
            padding: 12px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }
        .add-menu-item:hover {
            background-color: var(--bg-hover);
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            background-color: var(--bg-deep);
            scrollbar-gutter: stable;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Cards Grid / Wrappers */
        .accounts-wrapper {
            display: flex;
            flex-direction: column;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #222;
            position: relative;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid var(--bg-card);
        }

        .status-dot.online { background-color: var(--text-green); }
        .status-dot.offline { background-color: var(--text-muted); }
        .status-dot.loading { background-color: var(--text-yellow); }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-weight: 600;
            font-size: 16px;
        }

        .userid {
            font-size: 12px;
            color: var(--text-muted);
        }

        .card-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stat-box {
            background-color: #111;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
        }

        .stat-value {
            font-size: 13px;
            font-weight: 500;
            margin-top: 2px;
        }

        .stat-value.green { color: var(--text-green); }
        .stat-value.yellow { color: var(--text-yellow); }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .btn-launch {
            flex-grow: 1;
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .btn-launch:hover {
            background-color: var(--btn-hover);
        }

        .btn-icon {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            flex-shrink: 0;
        }

        .btn-icon:hover {
            background-color: var(--bg-hover);
            color: var(--text-main);
        }

        .btn-icon.danger:hover {
            background-color: var(--btn-danger);
            color: var(--text-danger);
            border-color: var(--btn-danger-hover);
        }

        .btn-remove {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .btn-remove:hover {
            background-color: var(--btn-danger);
            color: var(--text-danger);
            border-color: var(--btn-danger-hover);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background-color: #333;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            border: 1px solid #444;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 400px;
            color: var(--text-muted);
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        .empty-state svg {
            width: 72px;
            height: 72px;
            margin-bottom: 20px;
            color: var(--text-muted);
            opacity: 0.3;
        }

        .empty-state h3 {
            color: var(--text-main);
            font-size: 20px;
            margin: 0 0 8px 0;
            font-weight: 600;
        }

        .empty-state p {
            font-size: 14px;
            margin: 0;
            max-width: 300px;
            line-height: 1.5;
        }

        /* Groups */
        .group-container {
            margin-bottom: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .group-header {
            padding: 12px 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }

        .group-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .group-header-left h3 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        .group-badge {
            background: var(--bg-hover);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .group-content-wrapper {
            display: grid;
            grid-template-rows: 1fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .group-container.collapsed .group-content-wrapper {
            grid-template-rows: 0fr;
        }

        .group-content {
            overflow: hidden;
        }

        .group-content-inner {
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            min-height: 20px;
            transition: background 0.2s;
        }
        
        .group-container.collapsed .group-header {
            border-bottom: none;
        }

        .group-container.collapsed .chevron {
            transform: rotate(-90deg);
        }

        .chevron {
            transition: transform 0.2s ease;
            color: var(--text-muted);
        }

        .group-actions {
            display: flex;
            gap: 8px;
        }
        
        .card.dragging {
            opacity: 0.5;
        }

        .group-content.drag-over {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
        }

        /* Animations */
        #add-menu {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            display: flex;
        }
        #add-menu.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        #cookie-modal, #group-modal {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            display: flex;
            backdrop-filter: blur(4px);
        }
        #cookie-modal.show, #group-modal.show {
            opacity: 1;
            pointer-events: auto;
        }
        #cookie-modal-content, #group-modal-content {
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }
        #cookie-modal.show #cookie-modal-content, #group-modal.show #group-modal-content {
            transform: scale(1);
        }

        .spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Resize Handles */
        .resize-edge { position: absolute; z-index: 9999; }
        .resize-edge.top { top: 0; left: 8px; right: 8px; height: 5px; cursor: n-resize; }
        .resize-edge.bottom { bottom: 0; left: 8px; right: 8px; height: 5px; cursor: s-resize; }
        .resize-edge.left { top: 8px; bottom: 8px; left: 0; width: 5px; cursor: w-resize; }
        .resize-edge.right { top: 8px; bottom: 8px; right: 0; width: 5px; cursor: e-resize; }
        .resize-edge.top-left { top: 0; left: 0; width: 8px; height: 8px; cursor: nw-resize; }
        .resize-edge.top-right { top: 0; right: 0; width: 8px; height: 8px; cursor: ne-resize; }
        .resize-edge.bottom-left { bottom: 0; left: 0; width: 8px; height: 8px; cursor: sw-resize; }
        .resize-edge.bottom-right { bottom: 0; right: 0; width: 8px; height: 8px; cursor: se-resize; }

        /* Scrollbar Redesign */
        ::-webkit-scrollbar {
            width: 14px;
            height: 14px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 10px;
            border: 4px solid var(--bg-deep); /* Creates the gap effect */
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        .main-content {
            overflow-y: auto;
        }

        /* Search Box */
        .search-box {
            display: flex;
            align-items: center;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 12px;
            width: 250px;
            transition: border-color 0.2s;
            flex-shrink: 0;
        }
        .search-box:focus-within {
            border-color: #555;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 13px;
            outline: none;
            width: 100%;
            margin-left: 8px;
        }
        .search-box input::placeholder {
            color: var(--text-muted);
        }
    </style>
</head>
